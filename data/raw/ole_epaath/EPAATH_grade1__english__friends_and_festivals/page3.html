Title : General Template

<script type="text/javascript">
  $cssLoader('css/common.css')
  $cssLoader('css/page3.css')
</script>
<!-- cssloader ends -->

<head>
  <!-- added to load data directly from server TO REMOVE DURING DEPLOYMENT-->
  <meta http-equiv="“Pragma”" content="”no-cache”" />
  <meta http-equiv="“Expires”" content="”-1″" />
  <meta http-equiv="“CACHE-CONTROL”" content="”NO-CACHE”" />
  <!-- added to load data directly from server ends -->
</head>

<div class="my_activity">
  <div id="loading-wrapper">
    <div id="loading-text">LOADING</div>
    <div id="loading-content"></div>
  </div>
  <div class="board"></div>
  <div class="nextBtn myNextStyle"></div>
  <div class="prevBtn myPrevStyle"></div>
</div>

<script id="general-template" type="text/x-handlebars-template">
  <div id="audio-holder"></div>
  	{{! update templatecontains data for if it has header, instruction, headerinstruction
  	or only has content --}}
  	{{#if hasheaderblock}}
  		<div class="generalTemplateblock" data-templatecontains="hasheaderblock">
  	{{else}}
  		<div class="generalTemplateblock" data-templatecontains="hasonlycontent">
  	{{/if}}

  		{{! header block start--}}
  		{{#if headerblock}}
  			<div class="headerblock {{headerblockadditionalclass}}">
  				{{#each headerblock}}
  					{{> textcontent}}
  				{{/each}}
  			</div>
  		{{/if}}
  		{{! header block end--}}
  		{{! content block start--}}
  		<div class="contentblock {{contentblockadditionalclass}}">
  		{{!content block content wrapper used for content orientation - centered vertically and horizontally--}}
  			<div class="coverboardfull {{coverboardadditionalclass}}">


  				{{#if uppertextblock}}
  					<div class="textblock {{uppertextblockadditionalclass}}">
  						{{#each uppertextblock}}
  							{{> textcontent}}
  							{{> imagecontent}}
  						{{/each}}
  					</div>
  				{{/if}}
  						{{#each titletextblock}}
  							{{> textcontent}}
  						{{/each}}
  				{{#each imageblock}}
  					{{> imagecontent}}
  				{{/each}}

  				{{#each imagecontainer}}
  					<div class={{wrapperclass}}>
  						{{> imagecontent}}
  					</div>
  				{{/each}}
  				{{#if contentdiv}}
  					<div class="{{contentdivclass}}">
  						{{#each contentdiv}}
  						<div class="{{innercontentdivclass}}">
  							{{> imagecontent}}
  							<p class="{{textclass}}" data-highlight="{{datahighlightflag}}" data-highlightcustomclass="{{datahighlightcustomclass}}">{{{textdata}}}</p>
  						</div>
  						{{/each}}
  					</div>
  				{{/if}}


  				<!-- {{#each contentdivmain}} -->
  				<!-- <div class="{{innercontentdivclass1}}"> -->
  					<!-- {{> imageblock}}
  					{{#each speechbox}}
  				<div class="speechbox {{speechbox}}">
  					<img class="speechbg {{imgclass}}" src="{{imgsrc}}">
  					<p class="{{textclass}}" data-highlight="{{datahighlightflag}}" data-highlightcustomclass="{{datahighlightcustomclass}}">{{{textdata}}}</p>
  					{{#if audioicon}}
  						<img class="audioicon {{audioclass}}" src="images/speaker.png">
  					{{/if}}
  				</div> -->
  				<!-- {{/each}} -->
  					<!-- <p class="{{textclass}}" data-highlight="{{datahighlightflag}}" data-highlightcustomclass="{{datahighlightcustomclass}}">{{{textdata}}}</p> -->
  				<!-- </div> -->
  				<!-- {{/each}} -->

  				{{#each containerBlock}}
  					<div class="{{mainContainer}}">
  						{{#if uppertextblock}}
  					<div class="textblock {{uppertextblockadditionalclass}}">
  						{{#each uppertextblock}}
  							{{> textcontent}}
  							{{> imagecontent}}
  						{{/each}}
  					</div>
  				{{/if}}
  						{{#each imageblock}}
  					{{> imagecontent}}
  				{{/each}}
  						{{#each speechbox}}
  							<div class="speechbox {{speechbox}}">
  								<img class="speechbg {{imgclass}}" src="{{imgsrc}}">
  								<p class="{{textclass}}" data-highlight="{{datahighlightflag}}" data-highlightcustomclass="{{datahighlightcustomclass}}">{{{textdata}}}</p>
  								{{#if audioicon}}
  									<img class="audioicon {{audioclass}}" src="images/speaker.png">
  								{{/if}}
  							</div>
  				<!-- {{/each}} -->
  					</div>
  				{{/each}}



  				{{#each popupinnerdiv}}
  						<div class="{{popupinnerdivclass}}">
  							{{> imagecontent}}
  							<p class="{{textclass}}" data-highlight="{{datahighlightflag}}" data-highlightcustomclass="{{datahighlightcustomclass}}">{{{textdata}}}</p>
  						</div>
  						{{/each}}
  				{{#if lowertextblock}}
  					<div class="textblock {{lowertextblockadditionalclass}}">
  						{{#each lowertextblock}}
  							{{> textcontent}}
  						{{/each}}
  					</div>
  				{{/if}}
  				{{#each extratextblock}}
  				<div class="{{contxtdiv}}">
  					<p class="{{textclass}}" data-highlight="{{datahighlightflag}}" data-highlightcustomclass="{{datahighlightcustomclass}}">{{{textdata}}}</p>
  				</div>
  				{{/each}}
  				{{#if definitionblock}}
  					<div class="definitionblock {{definitionblockadditionalclass}}">
  						{{#each definitionblock}}
  							{{> definitioncontent}}
  						{{/each}}
  					</div>
  				{{/if}}
  				{{#each speechbox}}
  					<div class="speechbox {{speechbox}}">
  						<img class="speechbg {{imgclass}}" src="{{imgsrc}}">
  						<p class="{{textclass}}" data-highlight="{{datahighlightflag}}" data-highlightcustomclass="{{datahighlightcustomclass}}">{{{textdata}}}</p>
  						{{#if audioicon}}
  							<img class="audioicon {{audioclass}}" src="images/speaker.png">
  						{{/if}}
  					</div>
  				{{/each}}

  				{{#each nametagblock}}
  					<div class="{{tagclass}}">
  						<img class="tag-audio-icon {{imgclass}}" src="{{imgsrc}}">
  						<p class="{{textclass}}" data-highlight="{{datahighlightflag}}" data-highlightcustomclass="{{datahighlightcustomclass}}">{{{textdata}}}</p>
  					</div>
  					{{/each}}
  			</div>
  		</div>
  		{{! content block end--}}
  	</div>
</script>
<!-- partials separated as subtemplate in handlebars -->
<script id="textcontent-partial" type="text/x-handlebars-template">
  <p
    class='{{textclass}}'
    data-highlight='{{datahighlightflag}}'
    data-highlightcustomclass='{{datahighlightcustomclass}}'
  >{{{textdata}}}</p>
</script>

<script id="imagecontent-partial" type="text/x-handlebars-template">
  {{#each imagestoshow}}
    <img class='{{imgclass}}' src='{{imgsrc}}' />
  {{/each}}
  {{#if imagelabels}}
    {{#each imagelabels}}
      <label
        class='{{imagelabelclass}}'
        data-highlight='{{datahighlightflag}}'
        data-highlightcustomclass='{{datahighlightcustomclass}}'
      >{{{imagelabeldata}}}</label>
    {{/each}}
  {{/if}}
  {{#if imagediv}}
    <div class='{{imagedivclass}}'>
      {{#if record}}
        <div class='recordpulse'>
        </div>
        <div class='speakpulse'>
        </div>
      {{/if}}
      {{#each imagediv}}
        <img class='{{imgclass}}' src='{{imgsrc}}' />
      {{/each}}
    </div>
  {{/if}}
</script>

<script id="definitioncontent-partial" type="text/x-handlebars-template">
  <img src='{{definitionImageSource}}' />
  <figcaption>{{definitionTextData}}</figcaption>
  <p
    class='definitiontextstyle'
    data-highlight='{{datahighlightflag}}'
    data-highlightcustomclass='{{datahighlightcustomclass}}'
  >{{{definitionInstructionData}}}</p>
</script>

<script type="text/javascript" src="js/soundjs-0.6.2.min.js"></script>

  $jsLoader('js/page3.js')
  $jsLoader('js/recorder.js')
  $jsLoader('js/recorder2.js')
</script>
