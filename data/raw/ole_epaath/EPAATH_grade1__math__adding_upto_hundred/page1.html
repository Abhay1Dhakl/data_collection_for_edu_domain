<!--
Title : General Template
-->

<script type="text/javascript">
  $cssLoader('css/common.css');
  $cssLoader('css/page1.css');
</script>
<!-- cssloader ends -->

<head>
  <!-- added to load data directly from server TO REMOVE DURING DEPLOYMENT-->
  <meta http-equiv="“Pragma”" content="”no-cache”" />
  <meta http-equiv="“Expires”" content="”-1″" />
  <meta http-equiv="“CACHE-CONTROL”" content="”NO-CACHE”" />
  <!-- added to load data directly from server ends -->
</head>

<div class="my_activity">
  <div id="loading-wrapper">
    <div id="loading-text">LOADING</div>
    <div id="loading-content"></div>
  </div>
  <div class="board"></div>
  <div class="nextBtn myNextStyle"></div>
  <div class="prevBtn myPrevStyle"></div>
</div>

<script id="general-template" type="text/x-handlebars-template">
  {{! update templatecontains data for if it has header, instruction, headerinstruction
  or only has content --}}
  {{#if hasheaderblock}}
  <div class="generalTemplateblock" data-templatecontains="hasheaderblock">
      {{else}}
      <div class="generalTemplateblock" data-templatecontains="hasonlycontent">
          {{/if}}

          {{! header block start--}}
          {{#if headerblock}}
          <div class="headerblock {{headerblockadditionalclass}}">
              {{#each headerblock}}
              {{> textcontent}}
              {{/each}}
          </div>
          {{/if}}
          {{! header block end--}}
          {{! content block start--}}
          <div class="contentblock {{contentblockadditionalclass}}">
              {{!content block content wrapper used for content orientation - centered vertically and horizontally--}}
              <div class="coverboardfull {{coverboardadditionalclass}}">

                  {{#each imageblock}}
                  {{#each imagestoshow}}
                  <div class="{{imgdiv}}">
                      <img class="{{imgclass}}" src="">
                      {{#if textblock}}
                      {{#each textblock}}
                      <p class=" {{imgcls}}">{{imgtxt}}</p>
                      {{/each}}
                      {{/if}}
                  </div>
                  {{/each}}
                  {{/each}}

                  {{#each imageblock1}}
                  {{#each imageblock}}
                  <div class="{{commonImgDiv}} img1">
                      {{#each imagestoshow}}
                      <div class="{{imgdiv}}">
                          <img class="{{imgclass}}" src="">
                      </div>
                      {{/each}}
                  </div>
                  {{/each}}
                  {{/each}}

                  {{#if uppertextblock}}
                  <div class="textblock {{uppertextblockadditionalclass}}">
                      {{#each uppertextblock}}
                      {{> textcontent}}
                      {{/each}}
                  </div>
                  {{/if}}

                  {{#if textblock}}
                  {{#each textblock}}
                    {{>textcontent}}
                  {{/each}}
                  {{/if}}


                  {{#if containerblock}}
                    <div class="{{containerblockadditionalclass}}">
                        {{#each containerblock}}
                            <div class="{{divclass}}">
                            </div>
                        {{/each}}
                    </div>
                  {{/if}}

                  {{#if optionblock}}
                  <div class="options">
                    {{#each optionblock}}
                    <div class="{{textdiv}}" data-answer="{{ans}}" data-highlight="{{datahighlightflag}}" data-highlightcustomclass="{{datahighlightcustomclass}}">
                        <p class="{{textclass}}">{{{textdata}}}</p>
                    </div>
                    {{/each}}
                  </div>
                  {{/if}}
              </div>
          </div>
          {{! content block end--}}
      </div>
  </div>
</script>
<!-- partials separated as subtemplate in handlebars -partials are subtemplates-->
<script id="textcontent-partial" type="text/x-handlebars-template">
  <div class='{{textdiv}}'>
    <p
      class='{{textclass}}'
      data-highlight='{{datahighlightflag}}'
      data-highlightcustomclass='{{datahighlightcustomclass}}'
      data-splitintofractions='{{splitintofractionsflag}}'
    >{{{textdata}}}</p>
  </div>
</script>

<script id="imagecontent-partial" type="text/x-handlebars-template">
  {{#each imagestoshow}}
    <img name='{{imgname}}' class='{{imgclass}}' src='{{imgsrc}}' />
    <p id='{{paragraph1}}'>Hello{{name}}</p>
  {{/each}}
  {{#if imagelabels}}
    {{#each imagelabels}}
      <label
        class='{{imagelabelclass}}'
        data-highlight='{{datahighlightflag}}'
        data-highlightcustomclass='{{datahighlightcustomclass}}'
      >{{{imagelabeldata}}}</label>
    {{/each}}
  {{/if}}
</script>

<script id="definitioncontent-partial" type="text/x-handlebars-template">
  <img src='{{definitionImageSource}}' />
  <figcaption>{{definitionTextData}}</figcaption>
  <p
    class='definitiontextstyle'
    data-highlight='{{datahighlightflag}}'
    data-highlightcustomclass='{{datahighlightcustomclass}}'
  >{{{definitionInstructionData}}}</p>
</script>

  $jsLoader('js/commonjs.js');
