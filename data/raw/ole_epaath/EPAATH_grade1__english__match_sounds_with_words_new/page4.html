  $cssLoader("css/page4.css");

<!-- cssloader ends -->

<head>
  <!-- added to load data directly from server TO REMOVE DURING DEPLOYMENT-->
  <meta http-equiv="“Pragma”" content="”no-cache”" />
  <meta http-equiv="“Expires”" content="”-1″" />
  <meta http-equiv="“CACHE-CONTROL”" content="”NO-CACHE”" />
  <!-- added to load data directly from server ends -->
</head>

<div class="my_activity">
  <div id="loading-wrapper">
    <div id="loading-text">LOADING</div>
    <div id="loading-content"></div>
  </div>
  <div class="board"></div>
  <!-- <div class="nextBtn myNextStyle"></div>
  <div class="prevBtn myPrevStyle"></div> -->
</div>

<script id="general-template" type="text/x-handlebars-template">
  {{! update templatecontains data for if it has header, instruction, headerinstruction
  or only has content --}}
  {{#if hasheaderblock}}
      <div class="generalTemplateblock" data-templatecontains="hasheaderblock">
  {{else}}
      <div class="generalTemplateblock" data-templatecontains="hasonlycontent">
  {{/if}}

      {{! header block start--}}
      {{#if headerblock}}
          <div class="headerblock {{headerblockadditionalclass}}">
              {{#each headerblock}}
                  {{> textcontent}}
              {{/each}}
          </div>
      {{/if}}
      {{! header block end--}}
      {{! content block start--}}
      <div class="contentblock {{contentblockadditionalclass}}">
      {{!content block content wrapper used for content orientation - centered vertically and horizontally--}}
          <div class="coverboardfull {{coverboardadditionalclass}}">

              {{#if uppertextblock}}
                  <div class="textblock {{uppertextblockadditionalclass}}">
                      {{#each uppertextblock}}
                         <p class="{{textclass}}" id="{{textid}}">{{textdata}}</p>
                      {{/each}}
                  </div>
              {{/if}}

              {{#if imageblock}}
              {{#each imageblock}}
              {{#each imagestoshow}}
                  <img class="{{imgclass}}" id="{{imgid}}" data-dataid="{{dataID}}" src="{{imgsrc}}" />
              {{/each}}
              {{/each}}
              {{/if}}

              {{#each speechbox}}
                  <div class="speechbox {{speechbox}}">
                      <img class="speechbg {{imgclass}}" src="{{imgsrc}}">
                      <p class="{{textclass}}" data-highlight="{{datahighlightflag}}" data-highlightcustomclass="{{datahighlightcustomclass}}">{{{textdata}}}</p>
                      {{#if audioicon}}
                          <img class="audioicon {{audioclass}}" src="images/speaker.png">
                      {{/if}}
                  </div>
              {{/each}}

              {{#if optionsblock}}
              <div class="optblock">
                {{#each optionsblock}}
                <p class="{{optiontxt}}">{{textdata}}</p>
                {{/each}}
              </div>
              {{/if}}


              {{#if titletxt}}
              {{#each titletxt}}
              <div class="boxtxt">
              <p class="{{titletxtclass}}" data-highlight="{{datahighlightflag}}" data-highlightcustomclass="{{datahighlightcustomclass}}">{{{titletxtdata}}}</p>
            </div>
              {{/each}}
              {{/if}}

              {{#if popupblock}}
              <div class="popupblock">
                  <!-- <img class="popupimg" src="" /> -->
                  {{#each popupblock}}
                  <img class="{{imgclass}}" src="{{imgsrc}}" />
                  {{/each}}
              </div>
              {{/if}}

              {{#if poptxt}}
              <div class="poptxt">
                {{#each poptxt}}
                <p class="{{popuptext}}">{{textdata}}</p>
                {{/each}}
              </div>
              {{/if}}

              <div class="imgtextblock">
                  {{#if imgtextblock}}
                  {{#each imgtextblock}}
                    <div class="{{divclass}}" id="{{divid}}">
                        <img class="{{imgclass}}" src="{{imgsrc}}" />
                        <div class="opttext {{opttext}}">
                          <img src= "{{opttextsrc}}" alt="" class="opttextclass">
                        <p class="{{textclass}}">{{textdata}}</p>
                      </div>
                    </div>
                  {{/each}}
                  {{/if}}
              </div>

              <!-- Slider -->

              {{#if imageslider}}
              <div class="slider">
      <div class="{{imagesliderclass}}">
          {{#each imageslider}}
            <div class="{{divclass}}" id="{{id}}">
                <img class="{{imgclass}}" src="{{imgsrc}}" />
               <img class="{{imgclass1}}" src="{{imgsrc1}}" id="{{id}}" />
                  <p class="{{textclass}}">{{textdata}}</p>

            </div>
          {{/each}}
            </div>
           </div>
           <div class="left-slide"></div>
           <div class="right-slide"></div>
      {{/if}}



          </div>
      </div>
      {{! content block end--}}
  </div>
</script>

<!-- partials separated as subtemplate in handlebars -partials are subtemplates-->
<script id="textcontent-partial" type="text/x-handlebars-template">
  <p
    class="{{textclass}}"
    data-highlight="{{datahighlightflag}}"
    data-highlightcustomclass="{{datahighlightcustomclass}}"
  >
    {{{textdata}}}
  </p>
</script>

<script id="imagecontent-partial" type="text/x-handlebars-template">
  {{#each imagestoshow}}
    <img name="{{imgname}}" class="{{imgclass}}" src="{{imgsrc}}" />
  {{/each}}
  {{#if imagelabels}}
    {{#each imagelabels}}
      <label
        class="{{imagelabelclass}}"
        data-highlight="{{datahighlightflag}}"
        data-highlightcustomclass="{{datahighlightcustomclass}}"
      >
        {{{imagelabeldata}}}
      </label>
    {{/each}}
  {{/if}}
</script>

<script id="definitioncontent-partial" type="text/x-handlebars-template">
  <img src="{{definitionImageSource}}" />
  <figcaption>
    {{definitionTextData}}
  </figcaption>
  <p
    class="definitiontextstyle"
    data-highlight="{{datahighlightflag}}"
    data-highlightcustomclass="{{datahighlightcustomclass}}"
  >
    {{{definitionInstructionData}}}
  </p>
</script>
